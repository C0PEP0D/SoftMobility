# Publish to PyPI on every GitHub release.
# Uses PyPI Trusted Publishing (OpenID Connect), so no long-lived token is
# stored in the repository. PyPI is configured to trust this exact workflow
# under the project's Manage -> Publishing page.

name: PyPI upload

on:
  release:
    types: [created]

jobs:
  publish_pypi:
    name: Publish package to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full tag history so Versioneer can derive the version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
