[tool.ruff]
line-length = 115
extend-exclude = [".claude"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort (import sorting)
    "UP",  # pyupgrade (modernize syntax for your Python version)
    "B",   # flake8-bugbear (common bug patterns)
]

[tool.ruff.format]
# defaults are black-compatible — no config needed unless you want to deviate

[tool.coverage.run]
source = ["softmobility"]
branch = true

[tool.coverage.report]
omit = [
    "*_version.py",
    "versioneer.py",
]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]