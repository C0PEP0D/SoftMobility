[tool.ruff]
line-length = 115
# Restrict ruff to user-maintained sources: the library, tests, and notebook
# tutorials. Anything outside these directories (versioneer.py, _version.py,
# drafts/, docs/, ...) is skipped.
include = [
    "softmobility/classes/**/*.py",
    "softmobility/tests/**/*.py",
    "softmobility/tutorials/**/*.py",
    "softmobility/tutorials/**/*.ipynb",
]
extend-exclude = [
    ".claude",
    # Tutorial 11 is a known work-in-progress; skip until it is rewritten.
    "softmobility/tutorials/11_sinking_rigid_body.ipynb",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort (import sorting)
    "UP",  # pyupgrade (modernize syntax for your Python version)
    "B",   # flake8-bugbear (common bug patterns)
]

[tool.ruff.format]
# defaults are black-compatible — no config needed unless you want to deviate

[tool.coverage.run]
source = ["softmobility"]
branch = true

[tool.coverage.report]
omit = [
    "*_version.py",
    "versioneer.py",
]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]