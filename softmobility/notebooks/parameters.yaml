# ========================================================
# Assembly of Spheres with Elastic Connections
# ========================================================
#
# Structure:
# - `dof_names`:    Additional prefixes/names for degrees of freedom (DOFs).
# - `design_names`: Additional prefixes/names for design parameters.
# - `input_names`:  Additional prefixes/names for input parameters.
# - `defaults`:     Initial values for DOFs and design parameters.
# - `spheres`:      List of spheres with geometry and forces/torques.
#
# Rules:
# - DOFs are detected if they match:
#   - Default prefix: `dof` (e.g., `dof0`, `dof1`).
#   - OR prefixes/names in `dof_names` (e.g., `x` → `x0`, `x1`).
# - Design parameters are detected if they match:
#   - Default prefix: `design` (e.g., `design0`).
#   - OR prefixes/names in `design_names` (e.g., `myradius`, `distance`).
# - Inputs are detected if they match prefixes/names in `input_names` and are
#   classified automatically by their suffix:
#   - 3D FIELD: base name appears with suffixes 0, 1, 2 in expressions
#     (e.g., `gravity0`, `gravity1`, `gravity2`).
#     These are the components of the field in the BODY frame.
#     The lab-frame field must be provided via a `Field` object in the solver,
#     which handles rotation to body frame at each timestep.
#     All three components must be present — partial use is an error.
#   - SCALAR: base name appears with no numeric suffix (e.g., `act_torque`).
#     Its time dependence must be provided via a `Scalar` object in the solver.
#
# Constraints:
# - Inputs may ONLY appear in force and torque expressions, not in
#   radius, position, or orientation.
# - Forces and torques must be LINEAR in all input variables.
#   The parser extracts C_field(dof, design) and C_stiff(dof, design) such that:
#       [F, T] = C_field @ inputs + C_stiff @ dofs
# ========================================================

# ----------------------------
# Variable Prefixes (Optional)
# ----------------------------
dof_names:      # DOF prefixes/names (extends default "dof")
  - x           # e.g., "x0", "x1" in expressions

design_names:   # Design parameter prefixes/names (extends default "design")
  - myradius    # e.g., "myradius" in expressions (scalar parameter)
  - distance    # e.g., "distance0", "distance1" in expressions
  - spring_k

input_names:    # Input prefixes/names (extends default "input")
  - gravity     # 3D FIELD: detected via gravity0, gravity1, gravity2 in expressions
                # → provide a Field object in the solver
  - act_torque  # SCALAR: detected via act_torque (no suffix) in expressions
                # → provide a Scalar object in the solver

# ----------------------------
# Default Values (Optional)
# ----------------------------
# Applies to DOFs and design parameters only.
# Input defaults are not set here — they are provided dynamically
# via Field and Scalar objects in the solver at runtime.
defaults:
  myradius: 0.25  # Design parameter
  spring_k: 1.0
  mass0: 1.0      # Constant: auto-detected (not a dof/design/input)
  mass1: -1.0     # constants are replaced by their values in functions

# ----------------------------
# Spheres (Mandatory)
# ----------------------------
# Each sphere has:
# - `radius`:      Expression (optional, default = 1)
# - `position`:    [x, y, z] (optional, default = [0, 0, 0])
# - `orientation`: [rx, ry, rz] (optional, default = [0, 0, 0])
# - `force`:       [fx, fy, fz] (optional, default = [0, 0, 0])
# - `torque`:      [tx, ty, tz] (optional, default = [0, 0, 0])
#
# Inputs (fields and scalars) may only appear in force and torque.
# Geometry (radius, position, orientation) must not contain inputs.

spheres:
  - # Sphere 0 #################
    radius: myradius
    position: [0, 0, distance]
    orientation: [x0, x1, 0]
    force: [mass0*gravity0, mass0*gravity1, mass0*gravity2]  # linear in field
    torque: [-spring_k*x0 + act_torque, -spring_k*x1, 0]     # linear in scalar

  - # Sphere 1 #################
    radius: "1 - myradius"
    position: [0, 0, "distance + 1"]
    orientation:
      - "-x0 * myradius / (1 - myradius)"
      - "-x1 * myradius / (1 - myradius)"
      - 0
    force: [mass1*gravity0, mass1*gravity1, mass1*gravity2]
    torque: [spring_k*x0 - act_torque, spring_k*x1, 0]       # balances Sphere 0

# ========================================================
# Solver usage (Python):
#
#   solver = FlowBodySolver(
#       soft_body = assembly,
#       flow      = my_flow,
#       input_map = {
#           "gravity": my_field,      # my_field is a Field object
#           "act_torque": my_scalar,  # my_scalar is a Scalar object
#       },
#   )
# ========================================================