# ========================================================
# Assembly of Spheres with Elastic Connections
# ========================================================
#
# Structure:
# - `dof_names`: Additional prefixes/names for degrees of freedom (DOFs).
# - `param_names`: Additional prefixes/names for parameters.
# - `defaults`: Initial values for DOFs and parameters.
# - `spheres`: List of spheres with geometry and forces.
#
# Rules:
# - DOFs are detected if they match:
#   - Default prefix: `dof` (e.g., `dof0`, `dof1`).
#   - OR prefixes/names in `dof_names` (e.g., `x` → `x0`, `x1`).
# - Parameters are detected if they match:
#   - Default prefixes: `param` (e.g., `param0`) and `k` (from `defaults`).
#   - OR prefixes/names in `param_names` (e.g., `myradius`, `distance`).
# - Expressions can use DOFs (`dof*`, `x*`) and parameters (`param*`, `k`, `myradius`, etc.).
# - Forces/torques must sum to zero (internal forces only).
# ========================================================

# ----------------------------
# Variable Prefixes (Optional)
# ----------------------------
dof_names:      # DOF prefixes/names (extends default "dof")
    - x           # Recognized as a DOF prefix/name (e.g., "x0" in expressions)
design_names:      # Parameter prefixes/names (extends default "param" and "k")
    - myradius    # Recognized as a parameter prefix/name (e.g., `myradius` in expressions)
    - distance    # Recognized as a parameter prefix/name (e.g., `distance` in expressions)
    - k
input_names:
    - mass
    - gravity

# ----------------------------
# Default Values (Optional)
# ----------------------------
# Initial values for DOFs and parameters:
# - DOFs: Use names like `dof0`, `x1` (based on `dof_names`).
# - Parameters: Use names from `param_names` or defaults like `k`.
defaults:
  x0: 1                      # DOF: Matches listed "x" prefix
  myradius: 0.25             # Parameter: Listed in `param_names`
  distance: 1                # Parameter: Listed in `param_names`
  k: 1                       # Parameter: Auto-detected (default prefix "k")

# ----------------------------
# Spheres (Mandatory)
# ----------------------------
# Each sphere has:
# - `radius`:   Expression (optional, default = 1)
# - `mass`:   Expression (optional, default = 0)
# - `position`: [x, y, z] (optional, default = [0, 0, 0])
# - `orientation`: [rx, ry, rz] (optional, default = [0, 0, 0])
# - `force`:    [fx, fy, fz] (optional, default = [0, 0, 0])
# - `torque`:   [tx, ty, tz] (optional, default = [0, 0, 0])
spheres:
  - # Sphere 0 #################
    radius: myradius          # Uses parameter `myradius`
    position: [0, 0, 0]       # Explicit coordinates (unquoted numbers)
    orientation: [x0, x1, 0]   # Uses DOF `x0` (default "dof" prefix)
    force: [mass0 * gravity0, mass0 * gravity1, mass0 * gravity2]
    torque: [-k * x0, -k*x1, 0]   # Mix of parameter (`k`) and DOF (`x0`)

  - # Sphere 1 #################
    radius: "1 - myradius"      # Expression (quotes optional)
    position: [0, 0, distance]  # Uses parameter `distance`
    orientation:
      - "-x0 * myradius / (1 - myradius)"  # Complex expression (quotes recommended)
      - "-x1 * myradius / (1 - myradius)"
      - 0
    force: [mass1 * gravity0, mass1 * gravity1, mass1 * gravity2]
    torque: [k * x0, k*x1, 0]  # Balances Sphere 0’s torque (sums to zero)

# ========================================================
# Notes:
# - Variables are detected by prefixes:
#   - DOFs: `dof*`, `x*` (from `dof_names`).
#   - Parameters: `param*`, `k`, `myradius`, `distance` (from `param_names` and defaults).
# - Quotes are optional for simple expressions but recommended for clarity.
# - Validation: Forces/torques must satisfy ∑𝐹 = 0 and ∑𝜏 = 0.
# ========================================================